<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой чат 👻</title>
    <style>
        :root {
            --bg: #1e1f22;
            --panel: #2b2d31;
            --msg: #313338;
            --brand: #5865f2;
            --brandh: #4752c4;
            --text: #dcddde;
            --muted: #949ba4;
            --red: #f23f43;
            --green: #23a559;
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 900px; height: 90vh; background: var(--panel); border-radius: 12px; display: flex; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        /* Левая панель – друзья */
        #sidebar { width: 240px; background: var(--bg); display: flex; flex-direction: column; border-right: 1px solid #3f4147; }
        #sidebar-header { padding: 16px; font-weight: bold; font-size: 1.1rem; border-bottom: 1px solid #3f4147; display: flex; justify-content: space-between; align-items: center; }
        #myIdDisplay { font-size: 0.75rem; color: var(--muted); cursor: pointer; }
        #friends-list { flex: 1; overflow-y: auto; padding: 8px; }
        .friend-item { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; margin-bottom: 2px; }
        .friend-item:hover { background: var(--msg); }
        .friend-item.active { background: var(--brand); }
        .friend-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; }
        .friend-name { font-size: 0.95rem; }
        .friend-status { font-size: 0.7rem; color: var(--muted); }
        .online-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; margin-left: auto; }
        .add-friend { margin: 8px; display: flex; gap: 8px; }
        .add-friend input { flex: 1; background: var(--panel); border: 1px solid #3f4147; border-radius: var(--radius); padding: 8px 12px; color: var(--text); font-size: 0.9rem; outline: none; }
        .add-friend input:focus { border-color: var(--brand); }
        .add-friend button { background: var(--brand); border: none; color: white; border-radius: var(--radius); padding: 8px 12px; cursor: pointer; font-weight: 600; transition: background 0.15s; }
        .add-friend button:hover { background: var(--brandh); }
        /* Правая часть – чат */
        #chat-panel { flex: 1; display: flex; flex-direction: column; }
        #chat-header { padding: 16px; border-bottom: 1px solid #3f4147; display: flex; align-items: center; gap: 8px; }
        #chat-header .friend-avatar { width: 36px; height: 36px; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 8px 14px; border-radius: 12px; background: var(--msg); align-self: flex-start; word-break: break-word; line-height: 1.4; }
        .msg.mine { align-self: flex-end; background: var(--brand); }
        .msg .meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 2px; }
        .msg-input { padding: 12px; border-top: 1px solid #3f4147; display: flex; gap: 8px; }
        .msg-input input { flex: 1; background: var(--bg); border: 1px solid #3f4147; border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-size: 0.95rem; outline: none; }
        .msg-input input:focus { border-color: var(--brand); }
        .msg-input button { background: var(--brand); border: none; color: white; border-radius: var(--radius); padding: 10px 16px; cursor: pointer; font-weight: 600; transition: background 0.15s; }
        .msg-input button:hover { background: var(--brandh); }
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 1.2rem; }
        .disconnect-btn { margin-left: auto; background: transparent; border: 1px solid var(--red); color: var(--red); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 0.8rem; }
        .disconnect-btn:hover { background: var(--red); color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <!-- Сайдбар друзей -->
    <div id="sidebar">
        <div id="sidebar-header">
            <span>👻 Друзья</span>
            <span id="myIdDisplay" title="Твой ID (нажми, чтобы скопировать)">Я</span>
        </div>
        <div id="friends-list"></div>
        <div class="add-friend">
            <input type="text" id="newFriendId" placeholder="ID друга...">
            <button onclick="addFriend()">➕</button>
        </div>
    </div>
    <!-- Чат -->
    <div id="chat-panel">
        <div id="chat-header" class="hidden">
            <div class="friend-avatar" id="active-friend-avatar"></div>
            <span id="active-friend-name"></span>
            <button class="disconnect-btn" onclick="disconnectCurrent()">Отключиться</button>
        </div>
        <div id="chat-messages"></div>
        <div class="empty-chat" id="empty-placeholder">Выбери друга или добавь нового</div>
        <div class="msg-input hidden" id="msg-input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg();">
            <button onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
<script>
// ── Глобальные переменные ──────────────────────
let myPeer = null;
let myId = null;
let connections = {};          // friendId -> DataConnection
let currentFriend = null;     // id текущего чата
let friends = {};             // id -> { name, avatarColor, ... } (сохраняется)

// ── Инициализация Peer ────────────────────────
function initPeer() {
    myId = Math.random().toString(36).substring(2, 8);
    myPeer = new Peer(myId, {
        host: '0.peerjs.com',
        port: 443,
        secure: true,
    });

    myPeer.on('open', (id) => {
        myId = id;
        document.getElementById('myIdDisplay').textContent = 'Мой ID: ' + id;
        document.getElementById('myIdDisplay').onclick = () => {
            navigator.clipboard.writeText(id);
            alert('ID скопирован: ' + id);
        };
        // Восстановить друзей из localStorage
        loadFriends();
        renderFriendList();
    });

    // Входящее соединение от другого пользователя
    myPeer.on('connection', (conn) => {
        setupConnection(conn);
    });

    myPeer.on('error', (err) => {
        console.error('Peer error:', err);
    });
}

// ── Сохранение / загрузка друзей (localStorage) ──
function saveFriends() {
    localStorage.setItem('ghost_friends', JSON.stringify(friends));
}
function loadFriends() {
    try {
        const saved = localStorage.getItem('ghost_friends');
        if (saved) friends = JSON.parse(saved);
    } catch(e) {}
}

// ── Отрисовка списка друзей ────────────────────
function renderFriendList() {
    const list = document.getElementById('friends-list');
    list.innerHTML = '';
    if (Object.keys(friends).length === 0) {
        list.innerHTML = '<div style="padding:16px;color:var(--muted);text-align:center">Пока нет друзей</div>';
        return;
    }
    for (const [fid, fdata] of Object.entries(friends)) {
        const item = document.createElement('div');
        item.className = 'friend-item' + (currentFriend === fid ? ' active' : '');
        item.innerHTML = `
            <div class="friend-avatar" style="background:${fdata.avatarColor || '#5865f2'}">${(fdata.name || fid).substring(0,2).toUpperCase()}</div>
            <div style="flex:1;min-width:0">
                <div class="friend-name">${fdata.name || fid}</div>
                <div class="friend-status">${connections[fid] ? '🟢 Онлайн' : '⚫ Офлайн'}</div>
            </div>
            ${connections[fid] ? '<span class="online-dot"></span>' : ''}
        `;
        item.onclick = () => openChat(fid);
        list.appendChild(item);
    }
}

// ── Добавление друга (подключение) ────────────
function addFriend() {
    const input = document.getElementById('newFriendId');
    const friendId = input.value.trim();
    if (!friendId || friendId === myId) {
        alert('Введи корректный ID!');
        return;
    }
    if (friends[friendId]) {
        // уже есть, просто открыть чат
        openChat(friendId);
        input.value = '';
        return;
    }
    // Сохраняем нового друга (имя пока id, потом можно изменить)
    friends[friendId] = { name: friendId, avatarColor: randomColor() };
    saveFriends();
    renderFriendList();
    openChat(friendId);
    input.value = '';
}

// ── Открытие чата с другом ────────────────────
function openChat(friendId) {
    currentFriend = friendId;
    document.getElementById('active-friend-name').textContent = friends[friendId].name || friendId;
    document.getElementById('active-friend-avatar').style.background = friends[friendId].avatarColor || '#5865f2';
    document.getElementById('active-friend-avatar').textContent = (friends[friendId].name || friendId).substring(0,2).toUpperCase();
    document.getElementById('chat-header').classList.remove('hidden');
    document.getElementById('empty-placeholder').classList.add('hidden');
    document.getElementById('msg-input-area').classList.remove('hidden');
    document.getElementById('msgInput').focus();
    // Очистить старые сообщения
    document.getElementById('chat-messages').innerHTML = '';
    // Установить активный класс в списке
    renderFriendList();
    // Установить соединение, если ещё нет
    if (!connections[friendId]) {
        establishConnection(friendId);
    }
}

// ── Установка P2P соединения ──────────────────
function establishConnection(friendId) {
    const conn = myPeer.connect(friendId, { reliable: true });
    setupConnection(conn);
}

function setupConnection(conn) {
    const friendId = conn.peer;
    // Если соединение уже существует, закрыть старое
    if (connections[friendId]) {
        connections[friendId].close();
    }
    connections[friendId] = conn;

    conn.on('open', () => {
        console.log('Connected to', friendId);
        // Добавить друга, если нет в списке
        if (!friends[friendId]) {
            friends[friendId] = { name: friendId, avatarColor: randomColor() };
            saveFriends();
            renderFriendList();
        }
        if (currentFriend === friendId) {
            // обновить UI
            renderFriendList();
        }
    });

    conn.on('data', (data) => {
        if (currentFriend === friendId) {
            addMessage(data, false);
        } else {
            // Можно показать уведомление, но пока пропустим
        }
    });

    conn.on('close', () => {
        delete connections[friendId];
        if (currentFriend === friendId) {
            // показать, что отключился
            renderFriendList();
        }
    });

    conn.on('error', (err) => {
        console.error('Connection error:', err);
        delete connections[friendId];
        renderFriendList();
    });

    // Если друг уже был открыт, перерендерим
    if (currentFriend === friendId) renderFriendList();
}

// ── Отправка сообщения ─────────────────────────
function sendMsg() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentFriend) return;
    const conn = connections[currentFriend];
    if (!conn) {
        alert('Соединение потеряно. Попробуй переподключиться.');
        return;
    }
    conn.send(text);
    addMessage(text, true);
    input.value = '';
}

function addMessage(text, isMine) {
    const container = document.getElementById('chat-messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg' + (isMine ? ' mine' : '');
    msgDiv.textContent = text;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

// ── Отключение от текущего чата ───────────────
function disconnectCurrent() {
    if (currentFriend && connections[currentFriend]) {
        connections[currentFriend].close();
        delete connections[currentFriend];
    }
    currentFriend = null;
    document.getElementById('chat-header').classList.add('hidden');
    document.getElementById('empty-placeholder').classList.remove('hidden');
    document.getElementById('msg-input-area').classList.add('hidden');
    document.getElementById('chat-messages').innerHTML = '';
    renderFriendList();
}

// ── Вспомогательные ────────────────────────────
function randomColor() {
    const colors = ['#5865f2','#57f287','#fee75c','#eb459e','#ed4245','#e67e22','#1abc9c','#3498db'];
    return colors[Math.floor(Math.random() * colors.length)];
}

// ── Старт ──────────────────────────────────────
initPeer();

// Перед закрытием страницы отключаем все соединения
window.addEventListener('beforeunload', () => {
    for (const conn of Object.values(connections)) {
        conn.close();
    }
});
</script>
</body>
</html>
