<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Messenger 👻</title>
    <!-- Discord-подобный стиль, упрощённый -->
    <style>
        :root {
            --bg1: #313338;
            --bg2: #2b2d31;
            --bg3: #1e1f22;
            --brand: #5865f2;
            --brandh: #4752c4;
            --green: #23a559;
            --red: #f23f43;
            --tp: #f2f3f5;
            --ts: #b5bac1;
            --tm: #80848e;
            --div: #3f4147;
            --r: 8px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:var(--bg3); font-family:'Segoe UI',sans-serif; color:var(--tp); }
        body { display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #app { width:100%; max-width:800px; height:95vh; background:var(--bg1); border-radius:12px; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,0.6); overflow:hidden; }
        header { padding:16px; background:var(--bg2); border-bottom:1px solid var(--div); display:flex; gap:12px; align-items:center; }
        .logo { font-size:1.5rem; }
        .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-left:auto; }
        button, input { font-family:inherit; font-size:0.9rem; border-radius:var(--r); border:none; padding:8px 14px; }
        button { cursor:pointer; background:var(--brand); color:#fff; font-weight:600; transition:0.15s; }
        button:hover { background:var(--brandh); }
        button.danger { background:var(--red); }
        input { background:var(--bg3); color:var(--tp); border:1px solid var(--div); }
        input:focus { border-color:var(--brand); outline:none; }
        #chat-box { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; }
        .message { max-width:70%; padding:10px 14px; border-radius:12px; background:var(--bg2); position:relative; animation:fadeIn 0.2s; }
        .message.mine { align-self:flex-end; background:var(--brand); }
        .message .timer { position:absolute; right:8px; top:-16px; font-size:0.7rem; color:var(--ts); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .input-area { padding:12px; display:flex; gap:8px; border-top:1px solid var(--div); }
        .input-area input { flex:1; }
        #status { font-size:0.8rem; color:var(--ts); padding:4px 12px; }
        .room-info { background:var(--bg2); padding:8px 12px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
        .copy-btn { background:transparent; color:var(--ts); padding:4px 8px; font-size:0.8rem; }
        .disconnect { background:var(--red); color:#fff; }
        small { color:var(--tm); }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <span class="logo">👻 Ghost Messenger</span>
            <div class="controls">
                <button id="createBtn" onclick="createRoom()">🆕 Создать комнату</button>
                <input type="text" id="remoteIdInput" placeholder="ID комнаты" style="width:160px;">
                <input type="text" id="encKeyInput" placeholder="Ключ (необяз.)" style="width:100px;">
                <button id="connectBtn" onclick="connectToRoom()">🔗 Подключиться</button>
                <button id="disconnectBtn" class="disconnect" style="display:none" onclick="disconnect()">✖ Отключиться</button>
            </div>
        </header>
        <div id="status">Ожидание...</div>
        <div id="roomInfo" class="room-info" style="display:none;">
            <span>Комната: <strong id="roomIdDisplay"></strong></span>
            <button class="copy-btn" onclick="copyRoomId()">📋 Копировать</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." disabled onkeydown="if(event.key==='Enter') sendMsg();">
            <button id="sendBtn" onclick="sendMsg()" disabled>➤</button>
            <button onclick="setSelfDestruct()">⏱️ <span id="selfDestructLabel">10s</span></button>
        </div>
    </div>

    <!-- PeerJS (сигнальный сервер) -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <!-- CryptoJS для AES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        // ─── состояние ────────────────────────────
        let peer = null;                // PeerJS объект
        let conn = null;               // DataConnection
        let myId = null;
        let encryptionKey = '';        // ключ AES
        let selfDestruct = 10;         // секунд до удаления
        const msgTimers = new Map();   // id -> таймер

        // ─── UI элементы ────────────────────────
        const statusEl = document.getElementById('status');
        const roomInfo = document.getElementById('roomInfo');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const remoteIdInput = document.getElementById('remoteIdInput');
        const encKeyInput = document.getElementById('encKeyInput');
        const createBtn = document.getElementById('createBtn');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const selfDestructLabel = document.getElementById('selfDestructLabel');

        // ─── создание комнаты ────────────────────
        function createRoom() {
            if (peer) {
                status('Уже есть активное соединение. Сначала отключись.');
                return;
            }
            // Генерируем случайный ID (6 символов)
            myId = Math.random().toString(36).substring(2, 8);
            initPeer(myId);
            encryptionKey = encKeyInput.value.trim(); // ключ берём из поля
        }

        // ─── подключение к комнате ──────────────
        function connectToRoom() {
            if (peer) {
                status('Уже есть активное соединение. Сначала отключись.');
                return;
            }
            const remoteId = remoteIdInput.value.trim();
            if (!remoteId) {
                status('Введи ID комнаты!');
                return;
            }
            encryptionKey = encKeyInput.value.trim();
            // наш ID случайный
            myId = Math.random().toString(36).substring(2, 8);
            initPeer(myId, remoteId);
        }

        function initPeer(id, remoteId = null) {
            peer = new Peer(id, {
                // Используем облачный сервер PeerJS (бесплатный)
                host: '0.peerjs.com',
                port: 443,
                secure: true,
            });

            peer.on('open', (pid) => {
                myId = pid;
                status('🟢 Peer запущен. Твой ID: ' + myId);
                if (remoteId) {
                    // Мы подключаемся к чужой комнате
                    connectToPeer(remoteId);
                } else {
                    // Мы создатель, ждём входящих
                    roomIdDisplay.textContent = myId;
                    roomInfo.style.display = 'flex';
                    status('🟢 Комната создана. Ожидаю подключения...');
                    toggleControls(true);
                }
            });

            peer.on('connection', (incomingConn) => {
                // Кто-то подключился к нам
                if (conn) {
                    incomingConn.close();
                    status('⚠️ Уже есть соединение. Отклонил новое.');
                    return;
                }
                conn = incomingConn;
                setupConnection();
                status('🔗 Кто-то подключился!');
            });

            peer.on('error', (err) => {
                status('❌ Ошибка Peer: ' + err);
                cleanUp();
            });

            peer.on('disconnected', () => {
                status('⚠️ Peer отключён. Пробую переподключиться...');
                peer.reconnect();
            });
        }

        function connectToPeer(remoteId) {
            conn = peer.connect(remoteId, {
                reliable: true,
            });
            setupConnection();
            status('Пытаюсь подключиться к ' + remoteId + '...');
        }

        function setupConnection() {
            conn.on('open', () => {
                status('✅ Соединение установлено! Можно общаться.');
                roomInfo.style.display = 'none';
                toggleControls(true);
                msgInput.disabled = false;
                sendBtn.disabled = false;
                disconnectBtn.style.display = 'inline-block';
                createBtn.style.display = 'none';
                connectBtn.style.display = 'none';
                remoteIdInput.style.display = 'none';
            });

            conn.on('data', (encryptedData) => {
                let text;
                if (encryptionKey) {
                    try {
                        const bytes = CryptoJS.AES.decrypt(encryptedData, encryptionKey);
                        text = bytes.toString(CryptoJS.enc.Utf8);
                        if (!text) throw new Error('Неверный ключ или данные');
                    } catch (e) {
                        text = '[сообщение не расшифровано]';
                    }
                } else {
                    text = encryptedData;
                }
                addMessage(text, false);
            });

            conn.on('close', () => {
                status('🔌 Соединение закрыто.');
                cleanUp();
            });

            conn.on('error', (err) => {
                status('❌ Ошибка соединения: ' + err);
                cleanUp();
            });
        }

        function sendMsg() {
            const raw = msgInput.value.trim();
            if (!raw || !conn) return;

            let payload = raw;
            if (encryptionKey) {
                payload = CryptoJS.AES.encrypt(raw, encryptionKey).toString();
            }

            conn.send(payload);
            addMessage(raw, true);
            msgInput.value = '';
        }

        function addMessage(text, isMine) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message' + (isMine ? ' mine' : '');
            msgDiv.textContent = text;
            // Таймер самоуничтожения
            const timerSpan = document.createElement('span');
            timerSpan.className = 'timer';
            msgDiv.appendChild(timerSpan);

            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Запускаем обратный отсчёт
            let remaining = selfDestruct;
            timerSpan.textContent = remaining + 's';
            const interval = setInterval(() => {
                remaining--;
                if (remaining <= 0) {
                    clearInterval(interval);
                    if (msgDiv.parentNode) {
                        msgDiv.style.opacity = '0';
                        setTimeout(() => msgDiv.remove(), 200);
                    }
                } else {
                    timerSpan.textContent = remaining + 's';
                }
            }, 1000);

            // На всякий случай сохраним идентификатор таймера (не обязательно)
            const timerId = { interval };
            msgTimers.set(msgDiv, timerId);
        }

        function setSelfDestruct() {
            const options = [5, 10, 15, 30, 60];
            const currentIdx = options.indexOf(selfDestruct);
            const nextIdx = (currentIdx + 1) % options.length;
            selfDestruct = options[nextIdx];
            selfDestructLabel.textContent = selfDestruct + 's';
            status('⏱️ Время жизни сообщений: ' + selfDestruct + ' сек.');
        }

        function disconnect() {
            if (conn) conn.close();
            if (peer) {
                peer.destroy();
                peer = null;
            }
            cleanUp();
        }

        function cleanUp() {
            if (conn) {
                conn.close();
                conn = null;
            }
            if (peer) {
                peer.destroy();
                peer = null;
            }
            // Очистить таймеры сообщений
            msgTimers.forEach((t) => clearInterval(t.interval));
            msgTimers.clear();
            chatBox.innerHTML = '';
            roomInfo.style.display = 'none';
            msgInput.disabled = true;
            sendBtn.disabled = true;
            disconnectBtn.style.display = 'none';
            createBtn.style.display = 'inline-block';
            connectBtn.style.display = 'inline-block';
            remoteIdInput.style.display = 'inline-block';
            status('Отключено');
        }

        function toggleControls(connected) {
            createBtn.style.display = connected ? 'none' : 'inline-block';
            connectBtn.style.display = connected ? 'none' : 'inline-block';
            remoteIdInput.style.display = connected ? 'none' : 'inline-block';
            disconnectBtn.style.display = connected ? 'inline-block' : 'none';
            msgInput.disabled = !connected;
            sendBtn.disabled = !connected;
        }

        function status(msg) {
            statusEl.textContent = msg;
        }

        function copyRoomId() {
            navigator.clipboard.writeText(myId).then(() => {
                status('📋 ID скопирован!');
            });
        }

        // Обработка закрытия вкладки
        window.addEventListener('beforeunload', () => {
            if (conn) conn.close();
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
